<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello from Sebastopol</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/config.js"></script>
  <style>
    /* ── Design tokens ──────────────────────────────────── */
    :root {
      /* Palette — deep obsidian dark */
      --bg-base:        #08080f;
      --bg-surface:     #101018;
      --bg-elevated:    #18181f;
      --bg-input:       #1c1c26;

      /* Borders */
      --border-subtle:  #1f1f2e;
      --border-default: #2a2a3e;
      --border-focus:   #7c6ef0;

      /* Primary — electric indigo */
      --primary:        #7c6ef0;
      --primary-hover:  #6b5de0;
      --primary-glow:   rgba(124, 110, 240, 0.18);

      /* Text */
      --text-primary:   #eeeef5;
      --text-secondary: #8888aa;
      --text-muted:     #44445a;

      /* Semantic */
      --error:          #f87171;

      /* Elevation shadows */
      --shadow-card:    0 1px 2px rgba(0,0,0,.5), 0 4px 16px rgba(0,0,0,.35);
      --shadow-form:    0 2px 4px rgba(0,0,0,.6), 0 8px 32px rgba(0,0,0,.4);
      --shadow-btn:     0 2px 12px rgba(124,110,240,.35);

      /* Motion */
      --ease:           cubic-bezier(.16,1,.3,1);
    }

    /* ── Reset ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 56px 24px 80px;
      -webkit-font-smoothing: antialiased;
    }

    /* Subtle radial glow behind the content */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(124,110,240,.12), transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Layout ─────────────────────────────────────────── */
    .container {
      position: relative;
      z-index: 1;
      max-width: 620px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 48px;
    }

    /* ── Header ─────────────────────────────────────────── */
    .site-header {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.8px;
      line-height: 1.1;
      background: linear-gradient(135deg, var(--text-primary) 40%, var(--primary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .site-header p {
      font-size: 0.9rem;
      color: var(--text-secondary);
      font-weight: 400;
    }

    /* ── Form ───────────────────────────────────────────── */
    .note-form {
      background: var(--bg-surface);
      border: 1px solid var(--border-default);
      border-radius: 16px;
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      box-shadow: var(--shadow-form);
      transition: border-color 0.2s var(--ease);
    }

    .note-form:focus-within {
      border-color: var(--border-focus);
    }

    .form-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .note-form input,
    .note-form textarea {
      width: 100%;
      padding: 11px 14px;
      background: var(--bg-input);
      border: 1px solid var(--border-subtle);
      border-radius: 10px;
      font-size: 0.95rem;
      font-family: inherit;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      resize: vertical;
    }

    .note-form input::placeholder,
    .note-form textarea::placeholder {
      color: var(--text-muted);
    }

    .note-form input:focus,
    .note-form textarea:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }

    .note-form textarea {
      min-height: 110px;
      line-height: 1.6;
    }

    .form-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .form-error {
      font-size: 0.82rem;
      color: var(--error);
    }

    .note-form button {
      background: var(--primary);
      color: #fff;
      border: none;
      padding: 10px 22px;
      border-radius: 9px;
      font-size: 0.875rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 0.01em;
      box-shadow: var(--shadow-btn);
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
    }

    .note-form button:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 18px rgba(124,110,240,.45);
    }

    .note-form button:active  { transform: translateY(0); }
    .note-form button:disabled {
      background: #3a3a55;
      color: var(--text-muted);
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    /* ── Section heading ────────────────────────────────── */
    .section-heading {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .section-heading h2 {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .section-heading .count {
      font-size: 0.7rem;
      font-weight: 700;
      background: var(--bg-elevated);
      border: 1px solid var(--border-default);
      color: var(--text-secondary);
      border-radius: 20px;
      padding: 1px 8px;
    }

    /* ── Notes list ─────────────────────────────────────── */
    .notes-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .note-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: 14px;
      padding: 20px 22px;
      box-shadow: var(--shadow-card);
      transition: border-color 0.15s, transform 0.15s var(--ease);
    }

    .note-card:hover {
      border-color: var(--border-default);
      transform: translateY(-1px);
    }

    .note-card .note-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 7px;
      letter-spacing: -0.2px;
    }

    .note-card .note-body {
      font-size: 0.875rem;
      color: var(--text-secondary);
      line-height: 1.65;
      white-space: pre-wrap;
    }

    .note-card .note-date {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 12px;
      letter-spacing: 0.02em;
    }

    /* ── States ─────────────────────────────────────────── */
    .empty-state {
      font-size: 0.875rem;
      color: var(--text-muted);
      padding: 28px 0;
      text-align: center;
    }

    .loading {
      font-size: 0.875rem;
      color: var(--text-muted);
      padding: 28px 0;
      text-align: center;
    }

    /* ── Divider ────────────────────────────────────────── */
    .divider {
      height: 1px;
      background: var(--border-subtle);
    }
  </style>
</head>
<body>
  <div class="container">

    <header class="site-header">
      <h1>Hello from Sebastopol</h1>
      <p>A shared space for notes.</p>
    </header>

    <form class="note-form" id="noteForm">
      <span class="form-label">New note</span>
      <input type="text" id="noteTitle" placeholder="Title" required />
      <textarea id="noteBody" placeholder="Write something…" required></textarea>
      <div class="form-footer">
        <span class="form-error" id="formError"></span>
        <button type="submit" id="submitBtn">Post note</button>
      </div>
    </form>

    <div class="divider"></div>

    <section class="notes-section">
      <div class="section-heading">
        <h2>Notes</h2>
        <span class="count" id="noteCount">—</span>
      </div>
      <div class="notes-list" id="notesList">
        <p class="loading">Loading…</p>
      </div>
    </section>

  </div>

  <script>
    const client = window.supabase.createClient(
      window.SUPABASE_URL,
      window.SUPABASE_ANON_KEY
    );

    const list     = document.getElementById('notesList');
    const form     = document.getElementById('noteForm');
    const titleEl  = document.getElementById('noteTitle');
    const bodyEl   = document.getElementById('noteBody');
    const errorEl  = document.getElementById('formError');
    const btn      = document.getElementById('submitBtn');
    const countEl  = document.getElementById('noteCount');

    function formatDate(iso) {
      return new Date(iso).toLocaleString(undefined, {
        month: 'short', day: 'numeric', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    }

    function escHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function renderNotes(notes) {
      countEl.textContent = notes.length;
      if (!notes.length) {
        list.innerHTML = '<p class="empty-state">No notes yet — be the first.</p>';
        return;
      }
      list.innerHTML = notes.map(n => `
        <div class="note-card">
          <div class="note-title">${escHtml(n.title)}</div>
          <div class="note-body">${escHtml(n.body)}</div>
          <div class="note-date">${formatDate(n.created_at)}</div>
        </div>
      `).join('');
    }

    async function loadNotes() {
      const { data, error } = await client
        .from('notes')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) {
        list.innerHTML = `<p class="empty-state">Failed to load notes: ${escHtml(error.message)}</p>`;
        return;
      }
      renderNotes(data);
    }

    form.addEventListener('submit', async e => {
      e.preventDefault();
      errorEl.textContent = '';
      const title = titleEl.value.trim();
      const body  = bodyEl.value.trim();
      if (!title || !body) return;

      btn.disabled = true;
      btn.textContent = 'Posting…';

      const { error } = await client.from('notes').insert({ title, body });

      btn.disabled = false;
      btn.textContent = 'Post note';

      if (error) {
        errorEl.textContent = error.message;
        return;
      }

      titleEl.value = '';
      bodyEl.value  = '';
      await loadNotes();
    });

    loadNotes();
  </script>
</body>
</html>
