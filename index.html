<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pioneer Notes</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
      padding: 48px 24px;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 40px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    /* ── Form ── */
    .note-form {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .note-form h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #555;
    }

    .note-form input,
    .note-form textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      color: #1a1a1a;
      outline: none;
      transition: border-color 0.15s;
      resize: vertical;
    }

    .note-form input:focus,
    .note-form textarea:focus {
      border-color: #4f46e5;
    }

    .note-form textarea {
      min-height: 100px;
    }

    .note-form button {
      align-self: flex-end;
      background: #4f46e5;
      color: #fff;
      border: none;
      padding: 10px 24px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .note-form button:hover { background: #4338ca; }
    .note-form button:disabled { background: #a5a3e8; cursor: not-allowed; }

    .form-error {
      font-size: 0.85rem;
      color: #ef4444;
    }

    /* ── Notes list ── */
    .notes-section h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #555;
      margin-bottom: 16px;
    }

    .notes-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .note-card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 20px 24px;
    }

    .note-card .note-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .note-card .note-body {
      font-size: 0.9rem;
      color: #444;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .note-card .note-date {
      font-size: 0.75rem;
      color: #aaa;
      margin-top: 10px;
    }

    .empty-state {
      font-size: 0.9rem;
      color: #999;
      padding: 24px 0;
    }

    .loading {
      font-size: 0.9rem;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>hello from Pioneer Species</h1>

    <form class="note-form" id="noteForm">
      <h2>New note</h2>
      <input type="text" id="noteTitle" placeholder="Title" required />
      <textarea id="noteBody" placeholder="Write something…" required></textarea>
      <span class="form-error" id="formError"></span>
      <button type="submit" id="submitBtn">Post note</button>
    </form>

    <section class="notes-section">
      <h2>Notes</h2>
      <div class="notes-list" id="notesList">
        <p class="loading">Loading…</p>
      </div>
    </section>
  </div>

  <script>
    const client = window.supabase.createClient(
      window.SUPABASE_URL,
      window.SUPABASE_ANON_KEY
    );

    const list    = document.getElementById('notesList');
    const form    = document.getElementById('noteForm');
    const titleEl = document.getElementById('noteTitle');
    const bodyEl  = document.getElementById('noteBody');
    const errorEl = document.getElementById('formError');
    const btn     = document.getElementById('submitBtn');

    function formatDate(iso) {
      return new Date(iso).toLocaleString(undefined, {
        month: 'short', day: 'numeric', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    }

    function renderNotes(notes) {
      if (!notes.length) {
        list.innerHTML = '<p class="empty-state">No notes yet — be the first!</p>';
        return;
      }
      list.innerHTML = notes.map(n => `
        <div class="note-card">
          <div class="note-title">${escHtml(n.title)}</div>
          <div class="note-body">${escHtml(n.body)}</div>
          <div class="note-date">${formatDate(n.created_at)}</div>
        </div>
      `).join('');
    }

    function escHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    async function loadNotes() {
      const { data, error } = await client
        .from('notes')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) {
        list.innerHTML = `<p class="empty-state">Failed to load notes: ${escHtml(error.message)}</p>`;
        return;
      }
      renderNotes(data);
    }

    form.addEventListener('submit', async e => {
      e.preventDefault();
      errorEl.textContent = '';
      const title = titleEl.value.trim();
      const body  = bodyEl.value.trim();
      if (!title || !body) return;

      btn.disabled = true;
      btn.textContent = 'Posting…';

      const { error } = await client.from('notes').insert({ title, body });

      btn.disabled = false;
      btn.textContent = 'Post note';

      if (error) {
        errorEl.textContent = error.message;
        return;
      }

      titleEl.value = '';
      bodyEl.value  = '';
      await loadNotes();
    });

    loadNotes();
  </script>
</body>
</html>
